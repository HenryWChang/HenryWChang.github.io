<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Henry W. Chang – Vocabulary Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* 🎨 完美继承你主页的全局样式 */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f7;
      color: #222;
      line-height: 1.6;
    }
    header {
      background: #1e293b;
      color: #f9fafb;
      padding: 20px 40px;
    }
    header h1 {
      margin: 0;
      font-size: 28px;
    }
    header p {
      margin: 4px 0 0 0;
      font-size: 14px;
      opacity: 0.9;
    }
    nav {
      background: #0f172a;
      padding: 8px 40px;
    }
    nav a {
      color: #e5e7eb;
      margin-right: 16px;
      text-decoration: none;
      font-size: 14px;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .container {
      max-width: 960px;
      margin: 24px auto 40px auto;
      padding: 0 16px;
    }
    section {
      background: #ffffff;
      border-radius: 8px;
      padding: 30px 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
    }
    section h2 {
      margin-top: 0;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 6px;
      font-size: 20px;
    }
    footer {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      padding: 20px 0 30px 0;
    }

    /* 🎯 专属背单词核心样式（完美融入卡片） */
    .word-box {
      text-align: center;
      padding: 40px 20px;
      margin: 20px 0;
    }
    .word-title {
      font-size: 42px;
      margin: 0 0 15px 0;
      color: #0f172a;
      font-weight: 700;
    }
    .word-meaning {
      font-size: 22px;
      color: #475569;
      min-height: 45px;
      margin: 20px auto;
      background: #f8fafc;
      padding: 12px;
      border-radius: 6px;
      max-width: 400px;
      border: 1px dashed #cbd5e1;
      display: none; /* 默认隐藏 */
    }
    .btn-group {
      margin-top: 25px;
    }
    button {
      background: #0284c7;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin: 0 8px;
      font-weight: 500;
      transition: background 0.2s;
    }
    button:hover {
      background: #0369a1;
    }
    button.secondary {
      background: #64748b;
    }
    button.secondary:hover {
      background: #475569;
    }
  </style>
</head>

<body>
  <!-- 🎛️ 相同的顶部 Header -->
  <header>
    <h1>Henry W. Chang</h1>
    <p>Personal academic homepage – notes, experiments, and ideas.</p>
  </header>

  <!-- 🧭 导航栏：加上了返回主页的链接 -->
  <nav>
    <a href="../">← Back to Home (返回主页)</a>
    <a href="#vocabulary">Vocabulary Builder</a>
  </nav>

  <div class="container">
    <!-- 📦 嵌入在你熟悉的主页 Section 卡片里的背单词模块 -->
    <section id="vocabulary">
      <h2>🎯 Custom Vocabulary Builder</h2>
      
      <div class="word-box">
        <div id="word" class="word-title">Loading...</div>
        <div id="meaning" class="word-meaning">Translation loading...</div>
        
        <div class="btn-group">
          <button class="secondary" onclick="showMeaning()">Show Meaning (看释义)</button>
          <button onclick="nextWord()">Next Word (下一个)</button>
        </div>
      </div>
    </section>
  </div>

  <footer>
    &copy; <span id="year"></span> Henry W. Chang. All rights reserved.
  </footer>

  <!-- 🧬 核心逻辑与数据引入 -->
  <script src="data.js"></script>
  <script>
    // 动态年份
    document.getElementById("year").textContent = new Date().getFullYear();

    let currentIndex = 0;

    function renderCard() {
        if (typeof wordData === 'undefined' || wordData.length === 0) {
            document.getElementById('word').innerText = "No data found";
            return;
        }
        document.getElementById('word').innerText = wordData[currentIndex].word;
        document.getElementById('meaning').innerText = wordData[currentIndex].meaning;
        document.getElementById('meaning').style.display = 'none'; // 换词时隐藏翻译
    }

    function showMeaning() {
        document.getElementById('meaning').style.display = 'block';
    }

    function nextWord() {
        currentIndex = (currentIndex + 1) % wordData.length;
        renderCard();
    }

    // 初始化
    window.onload = renderCard;
  </script>
</body>
</html>
