<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Profile - Henry's Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; }
    .card { background: #1e293b; padding: 30px; border-radius: 8px; width: 100%; max-width: 400px; border: 1px solid #334155; }
    input, select { width: 100%; padding: 10px; margin: 8px 0 16px 0; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
    button { background: #10b981; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: 600; }
    label { font-size: 13px; color: #94a3b8; }
  </style>
</head>
<body>

<div class="card">
  <h2>👤 Edit Profile</h2>
  
  <label>Email (ReadOnly)</label>
  <input type="text" id="email" disabled />

  <label>Name</label>
  <input type="text" id="name" placeholder="Enter your nickname" />

  <label>Gender</label>
  <select id="gender">
    <option value="Male">Male</option>
    <option value="Female">Female</option>
    <option value="Other">Other</option>
    <option value="Secrecy">Secrecy</option>
  </select>

  <label>Status</label>
  <select id="status" onchange="toggleStatus()">
    <option value="Student">Student</option>
    <option value="Professional">Professional</option>
  </select>

  <div id="dynamic-fields"></div>

  <label>Aim</label>
  <select id="aim">
    <option value="Improvement">Improvement</option>
    <option value="CET-4">CET-4</option>
    <option value="CET-6">CET-6</option>
    <option value="IELTS">IELTS</option>
    <option value="TOEFL">TOEFL</option>
    <option value="Other">Other</option>
  </select>

  <button onclick="saveProfile()">Save Changes</button>
  <button onclick="window.location.href='../hub.html'" style="background:transparent; margin-top:10px; text-decoration:underline;">Back to Hub</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabase = supabase.createClient('https://zjsdkyvjirrurehahpac.supabase.co', 'sb_publishable_6JSMsFOcoVVPpvVjzktC_w_S0FUKaeN');

  async function loadProfile() {
    const { data: { user } } = await supabase.auth.getUser();
    document.getElementById('email').value = user.email;
    
    let { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
    if (profile) {
      document.getElementById('name').value = profile.name || '';
      document.getElementById('gender').value = profile.gender || 'Male';
      document.getElementById('status').value = profile.status || 'Student';
      toggleStatus(profile.details_json);
    }
  }

  function toggleStatus(savedData = {}) {
    const status = document.getElementById('status').value;
    const container = document.getElementById('dynamic-fields');
    if (status === 'Student') {
      container.innerHTML = `
        <label>Stage</label>
        <select id="stage">
          <option value="Undergraduate">Undergraduate</option>
          <option value="Postgraduate">Postgraduate</option>
        </select>
        <label>Major</label>
        <select id="major">
          <option value="Education">Education</option>
          <option value="Arts">Arts</option>
        </select>`;
    } else {
      container.innerHTML = `
        <label>Occupation</label>
        <select id="occupation"><option>Managers</option><option>Professionals</option></select>
        <label>Highest Degree</label>
        <select id="degree"><option>Bachelor's</option><option>Master's</option></select>`;
    }
  }

  async function saveProfile() {
    const { data: { user } } = await supabase.auth.getUser();
    const status = document.getElementById('status').value;
    
    // 获取动态数据存入 jsonb
    const details = status === 'Student' ? 
      { stage: document.getElementById('stage').value, major: document.getElementById('major').value } :
      { occupation: document.getElementById('occupation').value, degree: document.getElementById('degree').value };

    const { error } = await supabase.from('profiles').upsert({
      id: user.id,
      email: user.email,
      name: document.getElementById('name').value,
      gender: document.getElementById('gender').value,
      status: status,
      details_json: details,
      aim: document.getElementById('aim').value
    });

    if (error) alert(error.message);
    else alert("Profile saved!");
  }

  loadProfile();
</script>
</body>
</html>
