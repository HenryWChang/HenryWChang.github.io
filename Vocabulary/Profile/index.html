<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Profile - Henry W. Chang</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { background: #0f172a; color: #f8fafc; font-family: -apple-system, sans-serif; padding: 40px 20px; display: flex; justify-content: center; }
    .card { background: #1e293b; padding: 30px; border-radius: 8px; width: 100%; max-width: 450px; border: 1px solid #334155; }
    h2 { margin-top: 0; color: #f8fafc; }
    label { font-size: 13px; color: #94a3b8; display: block; margin-top: 15px; }
    input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
    button { background: #10b981; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 20px; }
    .back-btn { background: transparent; border: 1px solid #475569; margin-top: 10px; color: #94a3b8; }
  </style>
</head>
<body>

<div class="card">
  <h2>👤 Edit Profile</h2>
  
  <label>E-mail (ReadOnly)</label>
  <input type="text" id="email" disabled />

  <label>Name</label>
  <input type="text" id="name" placeholder="Enter your nickname" />

  <label>Gender</label>
  <select id="gender">
    <option>Male</option><option>Female</option><option>Other</option><option>Secrecy</option>
  </select>

  <label>Status</label>
  <select id="status" onchange="renderDynamicFields()">
    <option value="">-- Please Select --</option>
    <option value="Student">Student</option>
    <option value="Professional">Professional</option>
  </select>

  <div id="dynamic-fields"></div>

  <label>Aim</label>
  <select id="aim">
    <option value="">-- Please Select --</option>
    <option>Improvement</option><option>Gaokao English (NCEE, English)</option><option>CET-4</option><option>CET-6</option>
    <option>TEM-4</option><option>TEM-8</option><option>Postgraduate Entrance English</option>
    <option>IELTS</option><option>TOEFL</option><option>GRE</option><option>Immigration</option><option>Other</option>
  </select>

  <button onclick="saveProfile()">Save Changes</button>
  <button class="back-btn" onclick="window.location.href='../hub.html'">Back to Hub</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseClient = supabase.createClient('https://zjsdkyvjirrurehahpac.supabase.co', 'sb_publishable_6JSMsFOcoVVPpvVjzktC_w_S0FUKaeN');

  async function init() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) { window.location.href = '../index.html'; return; }
    document.getElementById('email').value = user.email;

    let { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
    if (profile) {
      document.getElementById('name').value = profile.name || '';
      document.getElementById('gender').value = profile.gender || 'Male';
      document.getElementById('status').value = profile.status || '';
      document.getElementById('aim').value = profile.aim || '';
      renderDynamicFields(profile.details_json || {});
    }
  }

  // 动态字段渲染 (补全了所有选项)
  function renderDynamicFields(saved = {}) {
    const status = document.getElementById('status').value;
    const container = document.getElementById('dynamic-fields');
    if (!status) { container.innerHTML = ''; return; }

    if (status === 'Student') {
      container.innerHTML = `
        <label>Stage</label>
        <select id="stage" onchange="renderMajor('')">
          <option value="">-- Please Select --</option>
          <option ${saved.stage=='Primary'?'selected':''}>Primary</option>
          <option ${saved.stage=='Secondary'?'selected':''}>Secondary</option>
          <option ${saved.stage=='Undergraduate'?'selected':''}>Undergraduate</option>
          <option ${saved.stage=='Postgraduate'?'selected':''}>Postgraduate</option>
          <option ${saved.stage=='Doctoral'?'selected':''}>Doctoral</option>
        </select>
        <div id="major-wrap"></div>`;
      if (saved.stage) renderMajor(saved.major);
    } else {
      container.innerHTML = `
        <label>Occupation</label>
        <select id="occupation">
          <option value="">-- Please Select --</option>
          <option ${saved.occupation=='Armed Forces Occupations'?'selected':''}>Armed Forces Occupations</option>
          <option ${saved.occupation=='Managers'?'selected':''}>Managers</option>
          <option ${saved.occupation=='Professionals'?'selected':''}>Professionals</option>
          <option ${saved.occupation=='Technicians and Associate Professionals'?'selected':''}>Technicians and Associate Professionals</option>
          <option ${saved.occupation=='Clerical Support Workers'?'selected':''}>Clerical Support Workers</option>
          <option ${saved.occupation=='Service and Sales Workers'?'selected':''}>Service and Sales Workers</option>
          <option ${saved.occupation=='Skilled Agricultural, Forestry and Fishery Workers'?'selected':''}>Skilled Agricultural, Forestry and Fishery Workers</option>
          <option ${saved.occupation=='Craft and Related Trades Workers'?'selected':''}>Craft and Related Trades Workers</option>
          <option ${saved.occupation=='Plant and Machine Operators, and Assemblers'?'selected':''}>Plant and Machine Operators, and Assemblers</option>
          <option ${saved.occupation=='Elementary Occupations'?'selected':''}>Elementary Occupations</option>
        </select>
        <label>Highest Degree</label>
        <select id="degree">
          <option value="">-- Please Select --</option>
          <option ${saved.degree=='Secondary or Below'?'selected':''}>Secondary or Below</option>
          <option ${saved.degree=="Bachelor's"?'selected':''}>Bachelor's</option>
          <option ${saved.degree=="Master's"?'selected':''}>Master's</option>
          <option ${saved.degree=='Doctoral'?'selected':''}>Doctoral</option>
        </select>`;
    }
  }

  // 单独处理 Major 选择 (补全了所有选项)
  function renderMajor(selectedMajor = "") {
    const stage = document.getElementById('stage').value;
    const wrap = document.getElementById('major-wrap');
    if (['Undergraduate', 'Postgraduate', 'Doctoral'].includes(stage)) {
      wrap.innerHTML = `<label>Major</label><select id="major">
        <option value="">-- Please Select --</option>
        <option ${selectedMajor=='Education'?'selected':''}>Education</option>
        <option ${selectedMajor=='Arts and humanities'?'selected':''}>Arts and humanities</option>
        <option ${selectedMajor=='Social Sciences, Journalism and Information'?'selected':''}>Social Sciences, Journalism and Information</option>
        <option ${selectedMajor=='Business, Administration and Law'?'selected':''}>Business, Administration and Law</option>
        <option ${selectedMajor=='Natural Sciences, Mathematics and Statistics'?'selected':''}>Natural Sciences, Mathematics and Statistics</option>
        <option ${selectedMajor=='Information and Communication Technologies (ICTs)'?'selected':''}>Information and Communication Technologies (ICTs)</option>
        <option ${selectedMajor=='Engineering, Manufacturing and Construction'?'selected':''}>Engineering, Manufacturing and Construction</option>
        <option ${selectedMajor=='Agriculture, forestry, Fisheries and Veterinary'?'selected':''}>Agriculture, forestry, Fisheries and Veterinary</option>
        <option ${selectedMajor=='Health and Welfare'?'selected':''}>Health and Welfare</option>
        <option ${selectedMajor=='Services'?'selected':''}>Services</option>
        </select>`;
    } else { wrap.innerHTML = ''; }
  }

  window.saveProfile = async function() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    const status = document.getElementById('status').value;
    
    // 构建动态数据对象
    let details = {};
    if (status === 'Student') {
      details = { stage: document.getElementById('stage').value, major: document.getElementById('major')?.value || "N/A" };
    } else {
      details = { occupation: document.getElementById('occupation').value, degree: document.getElementById('degree').value };
    }

    const { error } = await supabaseClient.from('profiles').upsert({
      id: user.id, 
      email: user.email, 
      name: document.getElementById('name').value,
      gender: document.getElementById('gender').value, 
      status: status,
      details_json: details, // 【修正点：这里把动态数据存入 JSON】
      aim: document.getElementById('aim').value
    });

    alert(error ? "Error: " + error.message : "Profile saved successfully!");
  }

  init();
</script>
</body>
</html>
