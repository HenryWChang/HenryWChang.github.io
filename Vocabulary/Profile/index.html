<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Profile - Henry W. Chang</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { background: #0f172a; color: #f8fafc; font-family: -apple-system, sans-serif; padding: 40px 20px; display: flex; justify-content: center; }
    .card { background: #1e293b; padding: 30px; border-radius: 8px; width: 100%; max-width: 450px; border: 1px solid #334155; }
    h2 { margin-top: 0; color: #f8fafc; }
    label { font-size: 13px; color: #94a3b8; display: block; margin-top: 15px; }
    input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
    button { background: #10b981; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 20px; }
    .back-btn { background: transparent; border: 1px solid #475569; margin-top: 10px; color: #94a3b8; }
  </style>
</head>
<body>

<div class="card">
  <h2>👤 Edit Profile</h2>
  
  <label>E-mail (ReadOnly)</label>
  <input type="text" id="email" disabled />

  <label>Name</label>
  <input type="text" id="name" placeholder="Enter your nickname" />

  <label>Gender</label>
  <select id="gender">
    <option>Male</option><option>Female</option><option>Other</option><option>Secrecy</option>
  </select>

  <label>Status</label>
  <select id="status" onchange="renderDynamicFields()">
    <option value="Student">Student</option>
    <option value="Professional">Professional</option>
  </select>

  <div id="dynamic-fields"></div>

  <label>Aim</label>
  <select id="aim">
    <option>Improvement</option><option>Gaokao English (NCEE, English)</option><option>CET-4</option><option>CET-6</option>
    <option>TEM-4</option><option>TEM-8</option><option>Postgraduate Entrance English</option>
    <option>IELTS</option><option>TOEFL</option><option>GRE</option><option>Immigration</option><option>Other</option>
  </select>

  <button onclick="saveProfile()">Save Changes</button>
  <button class="back-btn" onclick="window.location.href='../hub.html'">Back to Hub</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // 确保只定义一次 supabase 客户端，并统一命名为 supabaseClient
  const supabaseClient = supabase.createClient('https://zjsdkyvjirrurehahpac.supabase.co', 'sb_publishable_6JSMsFOcoVVPpvVjzktC_w_S0FUKaeN');

  // 初始化函数
  async function init() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) { window.location.href = '../index.html'; return; }
    document.getElementById('email').value = user.email;

    let { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
    if (profile) {
      document.getElementById('name').value = profile.name || '';
      document.getElementById('gender').value = profile.gender || 'Male';
      document.getElementById('status').value = profile.status || 'Student';
      document.getElementById('aim').value = profile.aim || 'Improvement';
      renderDynamicFields(profile.details_json);
    } else {
      renderDynamicFields();
    }
  }

  // 动态字段渲染
  function renderDynamicFields(saved = {}) {
    const status = document.getElementById('status').value;
    const container = document.getElementById('dynamic-fields');
    // ... (保持你之前的渲染逻辑不变) ...
  }

  // 核心保存函数 - 确保这是全局函数
  window.saveProfile = async function() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return;
    
    // 获取表单数据
    const name = document.getElementById('name').value;
    const gender = document.getElementById('gender').value;
    const status = document.getElementById('status').value;
    const aim = document.getElementById('aim').value;
    // (获取动态字段逻辑...)

    const { error } = await supabaseClient.from('profiles').upsert({
      id: user.id, 
      email: user.email, 
      name: name,
      gender: gender, 
      status: status,
      // details_json: ...,
      aim: aim
    });

    if (error) {
      alert("Error: " + error.message);
    } else {
      alert("Profile saved successfully!");
    }
  }

  init();
</script>
</body>
</html>
